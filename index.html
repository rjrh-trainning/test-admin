<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal - RJRH TRAINING CENTER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #0a1931;       /* Deep Navy Blue */
            --accent: #9c7c38;        /* Luxury Gold */
            --accent-light: #f4eae1;  /* Soft Warm White */
            --grad-gold: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5b7 100%);
        }
        
        body { 
            font-family: 'Sarabun', sans-serif; 
            background: radial-gradient(circle at center, #15305b 0%, #061022 100%);
            min-height: 100vh;
            color: #fff;
        }

        /* Premium Glassmorphism Card */
        .premium-card { 
            width: 100%; 
            max-width: 480px; 
            padding: 40px; 
            border-radius: 28px; 
            background: rgba(255, 255, 255, 0.06); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4); 
            transition: all 0.4s ease;
        }

        /* Premium Inputs */
        .form-control-premium {
            background: rgba(255, 255, 255, 0.08) !important;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff !important;
            border-radius: 12px;
            padding: 12px 16px;
            transition: all 0.3s ease;
        }
        .form-control-premium:focus {
            background: rgba(255, 255, 255, 0.12) !important;
            border-color: #bf953f;
            box-shadow: 0 0 15px rgba(191, 149, 63, 0.3);
        }
        .form-control-premium::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        /* Gold Gradient Button */
        .btn-gold {
            background: var(--grad-gold);
            color: #000 !important;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            padding: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(179, 135, 40, 0.4);
        }
        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(252, 246, 186, 0.6);
            opacity: 0.95;
        }

        /* Menu Buttons styled elegantly */
        .menu-btn-premium { 
            padding: 18px 20px; 
            border-radius: 16px; 
            font-weight: 500; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            text-align: left; 
            display: flex; 
            align-items: center; 
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e0e6ed !important;
            text-decoration: none;
        }
        .menu-btn-premium i {
            color: #bf953f; /* Gold Icons */
            transition: transform 0.3s ease;
        }
        .menu-btn-premium:hover { 
            transform: translateX(5px); 
            background: rgba(255, 255, 255, 0.1);
            border-color: #bf953f;
            color: #fff !important;
            box-shadow: 0 5px 20px rgba(191, 149, 63, 0.15);
        }
        .menu-btn-premium:hover i {
            transform: scale(1.1);
        }

        /* Custom Soft Divider */
        .premium-hr {
            border-top: 1px dashed rgba(255, 255, 255, 0.2);
            opacity: 1;
        }

        /* Text Gold Highlight */
        .text-gold {
            background: var(--grad-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

<div id="authContainer" class="premium-card">
    <div class="text-center mb-4">
        <img src="https://ghgmupyrkeakyolliogv.supabase.co/storage/v1/object/public/rjrh-trainning's%20Org/rjrh-traiing.png" alt="RJRH Logo" style="height: 110px; object-fit: contain; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));">
        <h4 class="mt-3 text-gold text-uppercase tracking-wide">RJRH Training Center</h4>
        <p class="text-white-50 small mb-0">ระบบจัดการข้อมูลสำหรับเจ้าหน้าที่ (Central Portal)</p>
    </div>
    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="mb-3">
            <label class="form-label small fw-medium text-white-50">Username</label>
            <input type="email" id="loginEmail" class="form-control form-control-lg form-control-premium" placeholder="admin@gmail.com" required>
        </div>
        <div class="mb-4">
            <label class="form-label small fw-medium text-white-50">Password</label>
            <input type="password" id="loginPassword" class="form-control form-control-lg form-control-premium" placeholder="••••••••" required>
        </div>
        <button type="submit" id="btnLogin" class="btn btn-gold btn-lg w-100 fw-bold">เข้าสู่ระบบ</button>
    </form>
</div>

<div id="menuContainer" class="premium-card" style="display: none;">
    <div class="text-center mb-4">
        <img src="https://ghgmupyrkeakyolliogv.supabase.co/storage/v1/object/public/rjrh-trainning's%20Org/Gold%20premium.png" alt="RJRH Premium Logo" style="height: 130px; object-fit: contain; filter: drop-shadow(0 8px 20px rgba(183,135,40,0.3));">
        <h4 class="mt-3 text-gold">แผงควบคุมระบบงาน</h4>
        <p class="text-white-50 small mb-0">ยินดีต้อนรับเจ้าหน้าที่ กรุณาเลือกเมนูที่ต้องการปฏิบัติงาน</p>
    </div>
    
    <div class="d-grid gap-3">
        <a href="checkin.html" class="menu-btn-premium">
            <i class="fas fa-qrcode fa-lg me-3"></i> 
            <span>1. ระบบเช็คอิน / เช็คเอาท์หน้างาน</span>
        </a>
        <a href="participants.html" class="menu-btn-premium">
            <i class="fas fa-user-graduate fa-lg me-3"></i> 
            <span>2. ดูรายชื่อผู้สมัครฝึกอบรม</span>
        </a>
        <a href="sessions.html" class="menu-btn-premium">
            <i class="fas fa-sliders-h fa-lg me-3"></i> 
            <span>3. ตั้งค่า / เปิดรอบคอร์สอบรม</span>
        </a>
        <a href="certificate.html" class="menu-btn-premium">
            <i class="fas fa-award fa-lg me-3"></i> 
            <span>4. ระบบออกใบประกาศนียบัตร</span>
        </a>
    </div>
    
    <hr class="premium-hr my-4">
    <button class="btn btn-sm btn-outline-danger w-100 rounded-pill py-2 fw-medium" onclick="handleGlobalLogout()">
        <i class="fas fa-sign-out-alt me-2"></i> ออกจากระบบปลอดภัย
    </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="config.js"></script>
<script>
    window.addEventListener('DOMContentLoaded', async () => {
        const session = await checkAuthGuard();
        toggleView(session);
    });

    function toggleView(session) {
        if (session) {
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('menuContainer').style.display = 'block';
        } else {
            document.getElementById('authContainer').style.display = 'block';
            document.getElementById('menuContainer').style.display = 'none';
        }
    }

    async function handleLogin(e) {
        e.preventDefault();
        const btn = document.getElementById('btnLogin');
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> กำลังเข้าระบบ...';

        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        
        if (error) { 
            Swal.fire({
                title: 'ล็อกอินล้มเหลว',
                text: `สาเหตุ: ${error.message}`,
                icon: 'error',
                confirmButtonColor: '#b38728'
            }); 
            btn.disabled = false; 
            btn.innerHTML = 'เข้าสู่ระบบ'; 
        } else {
            toggleView(data.session);
            btn.disabled = false; 
            btn.innerHTML = 'เข้าสู่ระบบ'; 
        }
    }
</script>
</body>
</html>
