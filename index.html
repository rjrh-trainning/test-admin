<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal - RJRH TRAINING CENTER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --primary-dark: #061026; 
            --premium-gold: #cca43b; 
            --gold-light: #e5c060;
            --card-bg: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.12);
        }
        
        body { 
            font-family: 'Sarabun', sans-serif; 
            background: radial-gradient(circle at top right, #11254a 0%, #061026 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* เอฟเฟกต์กระจกฝ้า Glassmorphism ระดับพรีเมี่ยม */
        .premium-card { 
            width: 100%; 
            max-width: 480px; 
            padding: 40px; 
            border-radius: 28px; 
            background: rgba(15, 32, 67, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border); 
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255,255,255,0.1);
        }

        .text-gold {
            color: var(--premium-gold) !important;
            background: linear-gradient(135deg, #fff3d1 0%, var(--gold-light) 50%, var(--premium-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ตกแต่ง Input Form ให้ดูเนียนหรู */
        .form-control-custom {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff !important;
            border-radius: 12px;
            padding: 12px 16px;
            transition: all 0.3s ease;
        }
        .form-control-custom:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--premium-gold);
            box-shadow: 0 0 12px rgba(204, 164, 59, 0.3);
        }
        .form-control-custom::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        /* ปุ่มหลักสีทอง Luxury */
        .btn-gold {
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--premium-gold) 100%);
            border: none;
            color: #061026 !important;
            font-weight: 700;
            letter-spacing: 0.5px;
            border-radius: 12px;
            padding: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(204, 164, 59, 0.3);
        }
        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(204, 164, 59, 0.5);
            background: linear-gradient(135deg, #ffd974 0%, var(--gold-light) 100%);
        }

        /* ปุ่มเมนูดีไซน์เรียบหรูแบบโปร่งแสง */
        .menu-btn-custom { 
            padding: 18px 22px; 
            border-radius: 16px; 
            font-weight: 500; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
            text-align: left; 
            display: flex; 
            align-items: center; 
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
        }
        .menu-btn-custom i {
            transition: transform 0.3s ease;
        }
        .menu-btn-custom:hover { 
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(204, 164, 59, 0.5);
            color: #ffffff;
            transform: translateX(4px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .menu-btn-custom:hover i {
            transform: scale(1.15);
        }

        /* สีไอคอนแยกตามความเหมาะสมแต่คุมโทนพรีเมี่ยม */
        .icon-checkin { color: #52ec9b; }
        .icon-participants { color: #52b1ec; }
        .icon-sessions { color: #dfb2ff; }
        .icon-cert { color: var(--gold-light); }

        .brand-logo {
            height: 130px; 
            object-fit: contain;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
            animation: fadeIn 1.2s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

<div id="authContainer" class="premium-card text-center">
    <div class="mb-4">
        <img src="https://ghgmupyrkeakyolliogv.supabase.co/storage/v1/object/public/rjrh-trainning's%20Org/Gold%20premium.png" alt="RJRH Premium Logo" class="brand-logo">
        <h4 class="fw-bold text-gold mt-4">RJRH TRAINING CENTER</h4>
        <p class="text-white-50 small">ระบบจัดการข้อมูลสำหรับเจ้าหน้าที่ (Central Portal)</p>
    </div>
    <form id="loginForm" onsubmit="handleLogin(event)" class="text-start">
        <div class="mb-3">
            <label class="form-label fw-medium text-white-50 small">Username / Email</label>
            <input type="email" id="loginEmail" class="form-control form-control-lg form-control-custom" placeholder="admin@gmail.com" required>
        </div>
        <div class="mb-4">
            <label class="form-label fw-medium text-white-50 small">Password</label>
            <input type="password" id="loginPassword" class="form-control form-control-lg form-control-custom" placeholder="••••••••" required>
        </div>
        <button type="submit" id="btnLogin" class="btn btn-gold btn-lg w-100 fw-bold">เข้าสู่ระบบ</button>
    </form>
</div>

<div id="menuContainer" class="premium-card" style="display: none;">
    <div class="text-center mb-4">
        <img src="https://ghgmupyrkeakyolliogv.supabase.co/storage/v1/object/public/rjrh-trainning's%20Org/Gold%20premium.png" alt="RJRH Premium Logo" style="height: 70px; object-fit: contain;" class="mb-2">
        <h4 class="fw-bold text-gold">แผงควบคุมระบบงาน</h4>
        <p class="text-white-50 small">ยินดีต้อนรับเจ้าหน้าที่ กรุณาเลือกเมนูที่ต้องการปฏิบัติงาน</p>
    </div>
    
    <div class="d-grid gap-3">
        <a href="checkin.html" class="menu-btn-custom">
            <i class="fas fa-qrcode fa-lg me-3 icon-checkin"></i> 
            <span>1. ระบบเช็คอิน / เช็คเอาท์หน้างาน</span>
        </a>
        <a href="participants.html" class="menu-btn-custom">
            <i class="fas fa-list fa-lg me-3 icon-participants"></i> 
            <span>2. ดูรายชื่อผู้สมัครฝึกอบรม</span>
        </a>
        <a href="sessions.html" class="menu-btn-custom">
            <i class="fas fa-cog fa-lg me-3 icon-sessions"></i> 
            <span>3. ตั้งค่า / เปิดรอบคอร์สอบรม</span>
        </a>
        <a href="certificate.html" class="menu-btn-custom">
            <i class="fas fa-certificate fa-lg me-3 icon-cert"></i> 
            <span>4. ระบบออกใบประกาศนียบัตร</span>
        </a>
    </div>
    
    <hr class="my-4" style="border-color: rgba(255,255,255,0.15);">
    <button class="btn btn-sm btn-outline-danger w-100 rounded-pill fw-medium py-2" onclick="handleGlobalLogout()">
        <i class="fas fa-sign-out-alt me-2"></i>ออกจากระบบปลอดภัย
    </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="config.js"></script>
<script>
    window.addEventListener('DOMContentLoaded', async () => {
        const session = await checkAuthGuard();
        toggleView(session);
    });

    function toggleView(session) {
        if (session) {
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('menuContainer').style.display = 'block';
        } else {
            document.getElementById('authContainer').style.display = 'block';
            document.getElementById('menuContainer').style.display = 'none';
        }
    }

    async function handleLogin(e) {
        e.preventDefault();
        const btn = document.getElementById('btnLogin');
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> กำลังเข้าระบบ...';

        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        
        if (error) { 
            Swal.fire({
                icon: 'error',
                title: 'ล็อกอินล้มเหลว',
                text: `สาเหตุ: ${error.message}`,
                confirmButtonColor: '#cca43b'
            }); 
            btn.disabled = false; 
            btn.innerHTML = 'เข้าสู่ระบบ'; 
        } else {
            toggleView(data.session);
            btn.disabled = false; 
            btn.innerHTML = 'เข้าสู่ระบบ'; 
        }
    }
</script>
</body>
</html>
