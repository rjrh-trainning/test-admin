<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal - RJRH TRAINING CENTER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #071f54; --accent: #1976d2; }
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f4f8; }
        .login-card, .menu-card { width: 100%; max-width: 450px; padding: 35px; border-radius: 24px; background: #fff; box-shadow: 0 20px 60px rgba(7,31,84,0.1); }
        .menu-btn { padding: 15px; border-radius: 12px; font-weight: 600; transition: 0.2s; text-align: left; display: flex; align-items: center; }
        .menu-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">

<div id="authContainer" class="login-card">
    <div class="text-center mb-4">
        <img src="https://ghgmupyrkeakyolliogv.supabase.co/storage/v1/object/public/rjrh-trainning's%20Org/rjrh-traiing.png" alt="RJRH Logo" style="height: 120px; object-fit: contain;">
        <h4 class="fw-bold text-primary mt-3">RJRH TRAINING CENTER</h4>
        <p class="text-muted small">ระบบจัดการข้อมูลสำหรับเจ้าหน้าที่ (Central Portal)</p>
    </div>
    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input type="email" id="loginEmail" class="form-control form-control-lg bg-light" placeholder="admin@gmail.com" required>
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" id="loginPassword" class="form-control form-control-lg bg-light" placeholder="••••••••" required>
        </div>
        <button type="submit" id="btnLogin" class="btn btn-primary btn-lg w-100 rounded-3 fw-bold">เข้าสู่ระบบ</button>
    </form>
</div>

<div id="menuContainer" class="menu-card" style="display: none;">
    <div class="text-center mb-4">
        <h4 class="fw-bold text-primary">แผงควบคุมระบบงาน</h4>
        <p class="text-muted small">ยินดีต้อนรับเจ้าหน้าที่ กรุณาเลือกเมนูที่ต้องการปฏิบัติงาน</p>
    </div>
    <div class="d-grid gap-3">
        <a href="checkin.html" class="btn btn-outline-success menu-btn"><i class="fas fa-qrcode fa-lg me-3"></i> 1. ระบบเช็คอิน / เช็คเอาท์หน้างาน</a>
        <a href="participants.html" class="btn btn-outline-primary menu-btn"><i class="fas fa-list fa-lg me-3"></i> 2. ดูรายชื่อผู้สมัครฝึกอบรม</a>
        <a href="sessions.html" class="btn btn-outline-dark menu-btn"><i class="fas fa-cog fa-lg me-3"></i> 3. ตั้งค่า / เปิดรอบคอร์สอบรม</a>
        <a href="certificate.html" class="btn btn-outline-warning text-dark menu-btn"><i class="fas fa-certificate fa-lg me-3"></i> 4. ระบบออกใบประกาศนียบัตร</a>
    </div>
    <hr class="my-4">
    <button class="btn btn-sm btn-danger w-100 rounded-pill fw-bold" onclick="handleGlobalLogout()"><i class="fas fa-sign-out-alt me-1"></i> ออกจากระบบปลอดภัย</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="config.js"></script>
<script>
    window.addEventListener('DOMContentLoaded', async () => {
        const session = await checkAuthGuard();
        toggleView(session);
    });

    function toggleView(session) {
        if (session) {
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('menuContainer').style.display = 'block';
        } else {
            document.getElementById('authContainer').style.display = 'block';
            document.getElementById('menuContainer').style.display = 'none';
        }
    }

    async function handleLogin(e) {
        e.preventDefault();
        const btn = document.getElementById('btnLogin');
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> กำลังเข้าระบบ...';

        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        
        if (error) { 
            Swal.fire('ล็อกอินล้มเหลว', `สาเหตุ: ${error.message}`, 'error'); 
            btn.disabled = false; 
            btn.innerHTML = 'เข้าสู่ระบบ'; 
        } else {
            toggleView(data.session);
            btn.disabled = false; 
            btn.innerHTML = 'เข้าสู่ระบบ'; 
        }
    }
</script>
</body>
</html>
